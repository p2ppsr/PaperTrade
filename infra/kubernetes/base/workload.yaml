apiVersion: apps/v1
kind: Deployment
metadata:
  name: papertrade
  labels:
    app.kubernetes.io/name: papertrade
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: papertrade
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: papertrade
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: papertrade
          image: papertrade:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: papertrade-config
            - secretRef:
                name: papertrade-secrets
          volumeMounts:
            - name: papertrade-data
              mountPath: /data/papertrade
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 90
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 6Gi
      volumes:
        - name: papertrade-data
          persistentVolumeClaim:
            claimName: papertrade-data
