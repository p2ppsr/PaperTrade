proofrunVersion: 1
id: papertrade-reader-paid-page-reread-no-second-charge
name: PaperTrade paid page reread and no second charge
surface:
  repo: p2ppsr/PaperTrade
  workspace: /Users/tyeverett/projects/PaperTrade
  dossier: /Users/tyeverett/projects/network-ops/docs/repos/p2ppsr/PaperTrade.md
  category: redeem
  audience: "A returning reader who already paid for a page and expects access to persist without being charged again."
environment:
  kind: production
  baseUrl: https://papertrade.metanet.app
  healthEndpoints:
    - https://papertrade.metanet.app/healthz
    - https://papertrade.metanet.app/api/status
    - https://papertrade.metanet.app/api/publications
  deployment:
    system: github-actions
    workflow: Deploy Production Local Kubernetes
    namespace: papertrade-prod
    workload: deployment/papertrade
    releaseSource: "Capture current commit, workflow run, image tag, image digest, and pod name during preflight."
safety:
  stateChanging: true
  spendCap:
    amount: 0
    unit: sats
  testIdentities:
    - purpose: reader
      source: "A ProofRun reader wallet that already owns the selected PaperTrade publication/page entitlement. Do not record wallet secrets."
  cleanup:
    required: false
    instructions: "Use an existing entitlement created by papertrade-reader-paid-page-purchase or a known approved test entitlement."
matrix:
  desktopBrowsers:
    - chrome
  mobileBrowsers: []
  mobileSimulators:
    - android-emulator
  desktopWallets:
    - localhost-json-api-wallet-bridge
    - bsv-browser
  mobileWallets:
    - metanet-explorer-android
  serverWallets:
    - papertrade-server-wallet
  networks:
    - mainnet
preflight:
  commands:
    - description: Check production health
      command: curl -fsS https://papertrade.metanet.app/healthz
      cwd: /Users/tyeverett/projects/PaperTrade
    - description: Check public catalog
      command: curl -fsS https://papertrade.metanet.app/api/publications
      cwd: /Users/tyeverett/projects/PaperTrade
    - description: Capture production rollout state
      command: /Users/tyeverett/projects/network-ops/scripts/ops/kubectl.sh -n papertrade-prod get deploy papertrade -o wide
      cwd: /Users/tyeverett/projects/network-ops
    - description: Tail production logs before reread
      command: /Users/tyeverett/projects/network-ops/scripts/ops/kubectl.sh -n papertrade-prod logs deploy/papertrade --since=20m
      cwd: /Users/tyeverett/projects/network-ops
  requiredState:
    - "The selected reader identity has a prior entitlement for the selected publication/page."
    - "Spend cap for this flow is zero because no new payment should occur."
    - "Wallet substrate is available to authenticate the returning reader if required."
    - "The operator has a way to compare before/after telemetry and logs for duplicate paid unlock or payment attempts."
flow:
  steps:
    - id: open-owned-page-directly
      actor: returning-reader
      action: "Open the deep link for the already-owned paid page, such as /read/<publicationId>/2, in the same wallet/browser substrate."
      expected:
        ui:
          - "The app loads the owned page or asks only for identity/auth needed to prove ownership."
          - "The app does not present wording that suggests a new charge is required."
        telemetry:
          - "page.view is emitted for the deep link."
      timing:
        thresholdMs: 3000
    - id: approve-auth-if-needed
      actor: returning-reader
      action: "Approve any identity/auth wallet request required for ownership lookup, but do not approve any new payment."
      expected:
        ui:
          - "The wallet request wording is distinguishable from a payment request."
          - "The app explains that it is checking access or loading the owned page."
        wallet:
          - "No spend or payment request is made."
          - "If a prompt appears, it is an auth/access request consistent with rereading owned content."
        telemetry:
          - "reader.paid_page_access_started may appear as a neutral access-check event."
          - "wallet.prompt_shown and wallet.action_succeeded may appear, but no reader.paid_page_unlock_started should be emitted."
      timing:
        thresholdMs: 10000
    - id: verify-owned-page-renders
      actor: returning-reader
      action: "Wait for the paid page to render, then reload the page."
      expected:
        ui:
          - "The page image renders after direct open and after reload."
          - "No stale wallet-help, timeout, or install-wallet copy remains after success."
        domain:
          - "The server returns access as owned or already entitled, not newly paid."
          - "No new page_entitlements duplicate, ledger debit, or author credit is created."
        telemetry:
          - "The success path is visible without a duplicate conversion/payment signal."
      timing:
        thresholdMs: 10000
    - id: exercise-navigation-history
      actor: returning-reader
      action: "Use browser back, forward, and a fresh tab/deep link to return to the owned page."
      expected:
        ui:
          - "Navigation remains responsive and does not show a frozen loading state."
          - "The reader can return to the publication detail and back to the paid page."
        domain:
          - "No new charge is attempted in any navigation path."
assertions:
  uiAppearance:
    - "Owned-page reread UI is stable on required desktop/mobile/wallet substrate."
    - "History, reload, and deep link states do not leave overlapping wallet-help or loading messages."
  audienceIntuition:
    - "The returning reader can tell access is already owned."
    - "Any wallet prompt is understandable as identity/access, not a second purchase."
  customerTrust:
    - "The flow does not create duplicate-charge anxiety."
    - "There is no ambiguous retry button that could accidentally repurchase the same page."
  flowSuccess:
    - "The owned page renders by direct link, reload, and history navigation."
    - "Before/after checks show no second charge, duplicate entitlement, or duplicate author ledger credit."
  telemetryObservability:
    - "Events for reread are queryable and distinguish owned access from a fresh paid conversion."
    - "If the telemetry model cannot distinguish owned reread from paid unlock, outcome must be warn and the run record must file a follow-up."
  reliabilityRepeatability:
    - "The flow passes in a clean browser context with the same wallet identity."
    - "The run record documents the entitlement source without exposing private wallet material."
  performance:
    - "Owned-page render after auth/access check <= 10s."
    - "Reload and history navigation should not exceed paid-flow thresholds."
evidence:
  publicSafe:
    - "Run record in docs/proofrun/runs/."
    - "Screenshots showing owned page after direct link, reload, and navigation."
    - "Sanitized before/after log and telemetry evidence showing no duplicate paid conversion."
  privateArtifacts:
    - "network-ops/artifacts/proofrun/p2ppsr/PaperTrade/<timestamp>-reader-paid-page-reread-no-second-charge/"
telemetry:
  expectedEvents:
    - name: page.view
      required: true
    - name: wallet.prompt_shown
      required: false
    - name: wallet.action_succeeded
      required: false
    - name: reader.owned_page_accessed
      required: true
  forbiddenOrWarnEvents:
    - name: reader.paid_page_unlock_started
      condition: "Warn or fail if emitted for an already-owned page."
    - name: reader.paid_page_unlocked
      condition: "Warn or fail if emitted for an already-owned page without a new payment."
    - name: payout.created
      condition: "Fail if reread creates payout or ledger side effects."
  queryInstructions: "Query UserCom and production logs around the run session. Confirm any paid-page event is clearly owned/reread or server-confirmed no-charge. Do not print raw wallet auth material."
performanceThresholds:
  firstMeaningfulContentMs: 2000
  uiFeedbackAfterActionMs: 500
  walletPromptShownMs: 5000
  approvalToConfirmationMs: 10000
  fullFlowMs: 45000
  telemetryVisibleMs: 60000
recording:
  runRecordTemplate: /Users/tyeverett/projects/network-ops/docs/runbooks/proofrun-run-record-template.md
  productRunPath: docs/proofrun/runs/<YYYYMMDDTHHMMSSZ>-papertrade-reader-paid-page-reread-no-second-charge.md
  updateDossier: true
  updateReadinessRegistry: true
