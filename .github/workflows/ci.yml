name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          CWI_NPM_TOKEN: ${{ secrets.CWI_NPM_TOKEN }}
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
